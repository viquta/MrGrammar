services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mrgrammar}
      POSTGRES_USER: ${POSTGRES_USER:-mrgrammar}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mrgrammar} -d ${POSTGRES_DB:-mrgrammar}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10

  languagetool:
    image: erikvl87/languagetool:latest
    restart: unless-stopped
    environment:
      Java_Xms: 512m
      Java_Xmx: 1024m

  backend1:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    command: gunicorn mrgrammar.wsgi:application -c gunicorn.conf.py
    environment:
      DJANGO_DEBUG: "False"
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DJANGO_USE_X_FORWARDED_HOST: "True"
      POSTGRES_DB: ${POSTGRES_DB:-mrgrammar}
      POSTGRES_USER: ${POSTGRES_USER:-mrgrammar}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      POSTGRES_CONN_MAX_AGE: ${POSTGRES_CONN_MAX_AGE:-120}
      POSTGRES_CONN_HEALTH_CHECKS: "True"
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      LANGUAGETOOL_URL: http://languagetool:8010/v2
      ENABLE_ADVANCED_GERMAN_CHECKS: "True"
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gemma4:26b}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost}
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-4}
      GUNICORN_THREADS: ${GUNICORN_THREADS:-2}
      GUNICORN_TIMEOUT: ${GUNICORN_TIMEOUT:-60}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      languagetool:
        condition: service_started

  backend2:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    command: gunicorn mrgrammar.wsgi:application -c gunicorn.conf.py
    environment:
      DJANGO_DEBUG: "False"
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DJANGO_USE_X_FORWARDED_HOST: "True"
      POSTGRES_DB: ${POSTGRES_DB:-mrgrammar}
      POSTGRES_USER: ${POSTGRES_USER:-mrgrammar}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      POSTGRES_CONN_MAX_AGE: ${POSTGRES_CONN_MAX_AGE:-120}
      POSTGRES_CONN_HEALTH_CHECKS: "True"
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      LANGUAGETOOL_URL: http://languagetool:8010/v2
      ENABLE_ADVANCED_GERMAN_CHECKS: "True"
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gemma4:26b}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost}
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-4}
      GUNICORN_THREADS: ${GUNICORN_THREADS:-2}
      GUNICORN_TIMEOUT: ${GUNICORN_TIMEOUT:-60}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      languagetool:
        condition: service_started

  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    command: celery -A mrgrammar worker -l info --concurrency=${CELERY_WORKER_CONCURRENCY:-4}
    environment:
      DJANGO_DEBUG: "False"
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      POSTGRES_DB: ${POSTGRES_DB:-mrgrammar}
      POSTGRES_USER: ${POSTGRES_USER:-mrgrammar}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      POSTGRES_CONN_MAX_AGE: ${POSTGRES_CONN_MAX_AGE:-120}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      LANGUAGETOOL_URL: http://languagetool:8010/v2
      ENABLE_ADVANCED_GERMAN_CHECKS: "True"
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gemma4:26b}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      languagetool:
        condition: service_started

  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    command: celery -A mrgrammar beat -l info
    environment:
      DJANGO_DEBUG: "False"
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      POSTGRES_DB: ${POSTGRES_DB:-mrgrammar}
      POSTGRES_USER: ${POSTGRES_USER:-mrgrammar}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      POSTGRES_CONN_MAX_AGE: ${POSTGRES_CONN_MAX_AGE:-120}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      LANGUAGETOOL_URL: http://languagetool:8010/v2
      ENABLE_ADVANCED_GERMAN_CHECKS: "True"
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gemma4:26b}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      languagetool:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    environment:
      PUBLIC_API_URL: ${PUBLIC_API_URL:-http://localhost/api}
      ORIGIN: ${ORIGIN:-http://localhost}

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - frontend
      - backend1
      - backend2
    volumes:
      - ./infra/nginx/prod.conf:/etc/nginx/nginx.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1/healthz/ || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
  redisdata:
